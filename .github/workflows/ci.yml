name: Lucky CI

on:
  push:
    branches: [main]
  pull_request:
    branches: '*'

jobs:
  check_format:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v6
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest
      - name: Install shards
        run: shards install
      - name: Format
        run: crystal tool format --check
      - name: Lint
        run: ./bin/ameba
  specs:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        shard_file:
          - shard.yml
        crystal_version:
          - 1.16.3
          - latest
        experimental:
          - false
        include:
          - shard_file: shard.edge.yml
            crystal_version: latest
            experimental: true
            os: ubuntu-latest
          - shard_file: shard.override.yml
            crystal_version: nightly
            experimental: true
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v6
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{matrix.crystal_version}}
      - name: Install ImageMagick (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y imagemagick
      - name: Install ImageMagick (macOS)
        if: runner.os == 'macOS'
        run: brew install imagemagick
      - name: Install ImageMagick (Windows)
        if: runner.os == 'Windows'
        run: |
          $magickPath = (Get-Item "C:\Program Files\ImageMagick-*" | Select-Object -Last 1).FullName
          echo "$magickPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install shards
        run: shards install --skip-postinstall --skip-executables
        env:
          SHARDS_OVERRIDE: ${{ matrix.shard_file }}
      - name: Run tests
        run: crystal spec
